name: Build and push Docker images

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pycodestyle
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Lint with ruff
      run: |
        ruff check backend/
        ruff format --check backend/

  - name: Run backend tests
    run: |
      cd backend
      python manage.py test
    env:
      SECRET_KEY: "django-insecure-ci-key-12345"
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    - name: Run tests for backend
      run: |
        cd backend
        python manage.py test

    - name: Set up Node.js for frontend
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend

    - name: Run frontend tests
      run: npm test
      working-directory: frontend
      env:
        CI: true

  build_and_push_to_docker_hub:
    needs: tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Get short SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:${{ steps.vars.outputs.sha_short }}
          ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:${{ steps.vars.outputs.sha_short }}
          ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

    - name: Build and push gateway
      uses: docker/build-push-action@v5
      with:
        context: ./nginx
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:${{ steps.vars.outputs.sha_short }}
          ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest
